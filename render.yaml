services:
  - type: web
    name: tar-scraper-summarizer-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install && npx playwright install --with-deps chromium
    startCommand: node server.js
    envVars:
      - key: PORT
        value: 10000
      - key: GEMINI_API_KEY
        sync: false
      - key: BROWSERLESS_TOKEN
        sync: false
